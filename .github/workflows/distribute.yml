on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual triggering from GitHub page
  schedule:
    # run at 5:30 AM in the America/New_York timezone every Monday through Friday
    - cron: '30 5 * * 1-5'
      timezone: "America/New_York"

env:
  # To test with `act` on Windows you need to open Visual Studio Code from within Git Bash so `shell: bash` works.
  DK0WIN32: ${{ vars.dk0win32 || 'dksrc\dk0.cmd' }}
  DK0UNIX: ${{ vars.dk0unix || 'dksrc/dk0' }}
  HAVEDK0: ${{ vars.havedk0 || 'false' }}
  INPUTVERSION: ${{ inputs.dk-version || vars.dkversion }}
  INPUTOPTIONS: ${{ inputs.options || vars.options || format('-nosysinc --cell "dk0={0}"', github.workspace) }}
  INPUTDISTSCRIPT: ${{ inputs.distscript || vars.distscript }}
  INPUTID: ${{ inputs.id || vars.id }}
  INPUTPUBKEY: ${{ inputs.pubkey || vars.pubkey }}
  INPUTSECKEY: ${{ inputs.seckey || vars.seckey }}
  INPUTUSECACHE: ${{ inputs.use-cache || vars.usecache || 'true' }}
  INPUTEXPERIMENTAL_DK_OWNER: ${{ inputs.experimental-dk-owner || vars.experimental_dk_owner }}
  INPUTEXPERIMENTAL_MLFRONT_REF: ${{ inputs.experimental-mlfront-ref || vars.experimental_mlfront_ref }}

jobs:
  distribute:
    runs-on: windows-latest

    permissions:
      contents: write # for action-gh-release
      id-token: write # for actions/attest-build-provenance
      attestations: write # for actions/attest-build-provenance
      # required but does not work in `act`! bug: https://github.com/nektos/act/issues/6025
      #artifact-metadata: write # for actions/attest-build-provenance

    # The secrets created by `dksrc/dk0 prepare-version --ci github VERSION`
    # are tied to this environment only.
    environment: dk-distribution

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set DK variables
        id: dk-vars
        shell: bash
        run: |
          case "${{ env.INPUTVERSION }}" in
            2.4) DK_BUILD_VERSION_REF=V2_4; DK_BUILD_VERSION_MAJMIN=2.4 ;;
            2.5) DK_BUILD_VERSION_REF=V2_5; DK_BUILD_VERSION_MAJMIN=2.5 ;;
            *) echo "::error title=⛔ error hint::Unsupported version '${{ env.INPUTVERSION }}'. Supported versions: 2.4, 2.5"; exit 1 ;;
          esac
          echo "dk_build_version_ref=${DK_BUILD_VERSION_REF}" | tee -a "$GITHUB_OUTPUT"
          echo "dk_build_version_majmin=${DK_BUILD_VERSION_MAJMIN}" | tee -a "$GITHUB_OUTPUT"

          # distribution part. etc/dk/v/XXX/YYY.t -> YYY
          part=$(basename ${{ env.INPUTDISTSCRIPT }})
          part="${part%%.*}"
          echo "dk_dist_part=${part}" | tee -a "$GITHUB_OUTPUT"

          # split id into library_id and version
          if [[ "$${{ env.INPUTID }}" != *@* ]]; then
            echo "::error title=⛔ error hint::Invalid id '${{ env.INPUTID }}'. Must be of the form SomeLibrary_Unit@Version, like CommonsBase_Std@1.0.1"
            exit 1
          fi
          DK_ID="${{ env.INPUTID }}"
          DK_ID_LIBRARY="${DK_ID%@*}"
          DK_ID_VERSION="${DK_ID#*@}"
          if [[ -z "$DK_ID_LIBRARY" || -z "$DK_ID_VERSION" ]]; then
            echo "::error title=⛔ error hint::Invalid id '${{ env.INPUTID }}'. Must be of the form SomeLibrary_Unit@Version, like CommonsBase_Std@1.0.1"
            exit 1
          fi

          # validate version is valid semver using suggested semver regex
          # from https://semver.org/#is-there-a-suggested-regular-expression-regex-to-check-a-semver-string
          if command -v perl; then
            if ! perl -e 'exit 1 unless shift =~ /^(?P<major>0|[1-9]\d*)\.(?P<minor>0|[1-9]\d*)\.(?P<patch>0|[1-9]\d*)(?:-(?P<prerelease>(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+(?P<buildmetadata>[0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$/;' "$DK_ID_VERSION"; then
              echo "::error title=⛔ error hint::Invalid version '${DK_ID_VERSION}' in id '${{ env.INPUTID }}'. Version must be valid semver, like 1.0.1 or 1.0.0+some-build-metadata"
              exit 1
            fi
          else
            echo "::warning title=⚠️ warning hint::perl not found. Skipping semver validation for version '${DK_ID_VERSION}' in id '${{ env.INPUTID }}'. Version must be valid semver, like 1.0.1 or 1.0.0+some-build-metadata"
          fi

          # strip build metadata from version
          DK_ID_VERSION="${DK_ID_VERSION%%+*}"

          echo "dk_id_library=${DK_ID_LIBRARY}" | tee -a "$GITHUB_OUTPUT"
          echo "dk_id_version=${DK_ID_VERSION}" | tee -a "$GITHUB_OUTPUT"

          # convert version like 1.2.3 to underscore separated major and minor version like 1_2
          DK_ID_VERSION_MAJMINUNDER=$(printf "%s" "${DK_ID_VERSION}" | awk -F. '{print $1"_"$2}')
          echo "dk_id_version_majminunder=${DK_ID_VERSION_MAJMINUNDER}" | tee -a "$GITHUB_OUTPUT"

      - name: Check Key Pairs
        if: env.INPUTPUBKEY == '' || env.INPUTSECKEY == ''
        shell: bash
        # Produce message like:
        # > Distribution keypair missing. You need to populate 'distribute_2_4_pubkey' and 'distribute_2_4_seckey' in the Secrets for your workflow. See more in https://docs.github.com/en/actions/security-guides/encrypted-secrets. Then set the 'pubkey' and 'seckey' inputs in the 'with:' block of the workflow step, like: pubkey: ${{ secrets.distribute_2_4_pubkey }} seckey: ${{ secrets.distribute_2_4_seckey }}
        run: |
          echo "::error title=⛔ error hint::Distribution keypair missing. You need to populate 'distribute_${{ steps.dk-vars.outputs.dk_id_version_majminunder }}_pubkey' and 'distribute_${{ steps.dk-vars.outputs.dk_id_version_majminunder }}_seckey' in the Secrets for your workflow. See more in https://docs.github.com/en/actions/security-guides/encrypted-secrets. Then set the 'pubkey' and 'seckey' inputs in the 'with:' block of the workflow step, like the following on two lines: ${{ format('pubkey: {0}{1}{1} secrets.distribute_{3}_pubkey {2}{2} seckey: {0}{1}{1} secrets.distribute_{3}_seckey {2}{2}', '\$', '{', '}', steps.dk-vars.outputs.dk_id_version_majminunder) }}"
          exit 1

      # --------- C.1: Get dksrc/dk0 ----------

      - name: Get dksrc/dk0
        if: >
          env.HAVEDK0 == 'false'
          && env.INPUTEXPERIMENTAL_DK_OWNER != ''
          && (env.INPUTEXPERIMENTAL_MLFRONT_REF == '' || env.INPUTEXPERIMENTAL_MLFRONT_REF == 'false')
        uses: actions/checkout@v5
        with:
          repository: ${{ env.INPUTEXPERIMENTAL_DK_OWNER }}/dk
          path: dksrc
          ref: ${{ steps.dk-vars.outputs.dk_build_version_ref }}

      - name: Get dksrc/dk0
        if: >
          env.HAVEDK0 == 'false'
          && env.INPUTEXPERIMENTAL_DK_OWNER == ''
          && (env.INPUTEXPERIMENTAL_MLFRONT_REF == '' || env.INPUTEXPERIMENTAL_MLFRONT_REF == 'false')
        uses: actions/checkout@v5
        with:
          repository: diskuv/dk
          path: dksrc
          ref: ${{ steps.dk-vars.outputs.dk_build_version_ref }}

      # --------- C.2: Install dksrc/dk0 ----------
      - name: Set-up OCaml
        if: env.HAVEDK0 == 'false' && env.INPUTEXPERIMENTAL_MLFRONT_REF != '' && env.INPUTEXPERIMENTAL_MLFRONT_REF != 'false'
        uses: ocaml/setup-ocaml@57d9aa353e8d39677b1b9fc39637d48f27fe4a91 # v3
        with:
          ocaml-compiler: 5.4.0
          #   (synced from OCAML_OPAM_REPOSITORY in MlFront/.gitlab-ci.yml)
          #   2025-11-08. dkml-c-probe.3.2.0
          #   2025-10-10. initial
          opam-repositories: |
            default: git+https://github.com/ocaml/opam-repository.git#88e773ad9e5a6ed02fb2c1fab59e649624ac9db4
          cache-prefix: dk-distribute-v1
      - name: Get MlFront
        if: env.HAVEDK0 == 'false' && env.INPUTEXPERIMENTAL_MLFRONT_REF != '' && env.INPUTEXPERIMENTAL_MLFRONT_REF != 'false'
        shell: bash
        #   `git commit` required since `opam pin`` uses git+file://
        run: |
          git clone https://gitlab.com/dkml/build-tools/MlFront.git
          cd MlFront
          git reset --hard '${{ env.INPUTEXPERIMENTAL_MLFRONT_REF }}'

          sh ci/localize-pristine.sh
          git config user.email "nobody@example.com"
          git config user.name "nobody"
          git add --force dune-project *.opam
          git commit -m "pristine"

          printf 'opam version: '
          opam --version
      - name: Pin Latest MlFront
        if: env.HAVEDK0 == 'false' && env.INPUTEXPERIMENTAL_MLFRONT_REF != '' && env.INPUTEXPERIMENTAL_MLFRONT_REF != 'false'
        shell: bash
        run: cd MlFront && opam pin . --no-action -y
      - name: Install MlFront_Exec
        if: env.HAVEDK0 == 'false' && env.INPUTEXPERIMENTAL_MLFRONT_REF != '' && env.INPUTEXPERIMENTAL_MLFRONT_REF != 'false'
        shell: bash
        # Use `./MlFront_Exec.opam` not `MlFront_Exec` to process pin-depends:[]
        run: cd MlFront && opam install ./MlFront_Exec.opam -y
      - name: Create dksrc/dk0 Wrapper on Unix
        if: runner.os != 'Windows' && env.HAVEDK0 == 'false' && env.INPUTEXPERIMENTAL_MLFRONT_REF != '' && env.INPUTEXPERIMENTAL_MLFRONT_REF != 'false'
        shell: bash
        run: |
          install -d dksrc
          printf '#!/bin/sh\nset -euf\nopam exec -- dk0 "$@"\n' | tee dksrc/dk0
          chmod +x dksrc/dk0
      - name: Create dksrc\dk0.cmd Wrapper on Windows
        if: runner.os == 'Windows' && env.HAVEDK0 == 'false' && env.INPUTEXPERIMENTAL_MLFRONT_REF != '' && env.INPUTEXPERIMENTAL_MLFRONT_REF != 'false'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dksrc -Force | Out-Null
          $content = "@echo off`nsetlocal enabledelayedexpansion`nopam exec -- dk0 %*`n"
          Set-Content -Path dksrc\dk0.cmd -Value $content -Encoding ASCII

      # --------- E.1 Cache Restore ----------
      - name: Cache restore dk stores
        if: env.INPUTUSECACHE != '' && env.INPUTUSECACHE != 'false'
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        id: restore-cache-dk-distribute
        with:
            # The data stores (and build keys) are safe to share between Windows, macOS and Linux
            enableCrossOsArchive: true
            #   SYNC: must match Cache Save below
            path: t
            #   SYNC: must match Cache Save below.
            key: dk-stores-and-keys-x1-${{ steps.dk-vars.outputs.dk_build_version_majmin }}-${{ github.run_id }} # update cache on every run
            restore-keys: dk-stores-and-keys-x1-${{ steps.dk-vars.outputs.dk_build_version_majmin }}             # use latest cache for this version

      # --------- G.1 Distribute ----------

      - name: Distribute on Unix
        env:
            DK_BUILD_PUBKEY: "${{ env.INPUTPUBKEY }}"
            DK_BUILD_SECKEY: "${{ env.INPUTSECKEY }}"
        shell: bash
        if: runner.os != 'Windows'
        # --errors-plain option helps cross-platform CI caches since the cache+data is under the project t/ subdirectory
        run: |
          echo distribute and combine ...

          echo "Building object $object: dksrc/dk0 --errors-plain ${{ env.INPUTOPTIONS }} --keys-env DK_BUILD --verbose distribute ${{ steps.dk-vars.outputs.dk_id_library }}-${{ steps.dk-vars.outputs.dk_dist_part }} --library '${{ steps.dk-vars.outputs.dk_id_library }}@${{ steps.dk-vars.outputs.dk_id_version }}' ${{ env.INPUTDISTSCRIPT }}"
          ${{ env.DK0UNIX }} --errors-plain ${{ env.INPUTOPTIONS }} --keys-env DK_BUILD --verbose distribute ${{ steps.dk-vars.outputs.dk_id_library }}-${{ steps.dk-vars.outputs.dk_dist_part }} --library '${{ steps.dk-vars.outputs.dk_id_library }}@${{ steps.dk-vars.outputs.dk_id_version }}' ${{ env.INPUTDISTSCRIPT }}

          echo "Collecting tracestore: dksrc/dk0 --errors-plain ${{ env.INPUTOPTIONS }} --keys-env DK_BUILD --verbose distribute ${{ steps.dk-vars.outputs.dk_id_library }}-$part --no-valuestore --library '${{ steps.dk-vars.outputs.dk_id_library }}@${{ steps.dk-vars.outputs.dk_id_version }}'"
          ${{ env.DK0UNIX }} --errors-plain ${{ env.INPUTOPTIONS }} --keys-env DK_BUILD --verbose distribute ${{ steps.dk-vars.outputs.dk_id_library }}-$part --no-valuestore --library '${{ steps.dk-vars.outputs.dk_id_library }}@${{ steps.dk-vars.outputs.dk_id_version }}'

          echo "Combining: dksrc/dk0 --errors-plain ${{ env.INPUTOPTIONS }} --verbose combine --origin-name '${{ steps.dk-vars.outputs.dk_id_library }}' --mirror '${{github.server_url}}/${{github.repository}}/releases/download/${{github.ref_name}}'"
          ${{ env.DK0UNIX }} --errors-plain ${{ env.INPUTOPTIONS }} --verbose combine --origin-name '${{ steps.dk-vars.outputs.dk_id_library }}' --mirror '${{github.server_url}}/${{github.repository}}/releases/download/${{github.ref_name}}'

          du -sh dk-dist/*

      - name: Query traces on Unix
        env:
            DK_BUILD_PUBKEY: "${{ env.INPUTPUBKEY }}"
            DK_BUILD_SECKEY: "${{ env.INPUTSECKEY }}"
            OCAMLRUNPARAM: b
        shell: bash
        if: runner.os != 'Windows'
        run: |
          ${{ env.DK0UNIX }} --errors-plain ${{ env.INPUTOPTIONS }} --keys-env DK_BUILD query

      - name: Distribute on Windows
        env:
            DK_BUILD_PUBKEY: "${{ env.INPUTPUBKEY }}"
            DK_BUILD_SECKEY: "${{ env.INPUTSECKEY }}"
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          Write-Host "distribute and combine ..."

          Write-Host "Building object ${object}: dksrc\dk0.cmd --errors-plain ${{ env.INPUTOPTIONS }} --keys-env DK_BUILD --verbose distribute ${{ steps.dk-vars.outputs.dk_id_library }}-${{ steps.dk-vars.outputs.dk_dist_part }} --library '${{ steps.dk-vars.outputs.dk_id_library }}@${{ steps.dk-vars.outputs.dk_id_version }}' ${{ env.INPUTDISTSCRIPT }}"
          ${{ env.DK0WIN32 }} --errors-plain ${{ env.INPUTOPTIONS }} --keys-env DK_BUILD --verbose distribute ${{ steps.dk-vars.outputs.dk_id_library }}-${{ steps.dk-vars.outputs.dk_dist_part }} --library '${{ steps.dk-vars.outputs.dk_id_library }}@${{ steps.dk-vars.outputs.dk_id_version }}' ${{ env.INPUTDISTSCRIPT }}
          if ($LASTEXITCODE -ne 0) {
            throw "dk0 distribute failed with exit code $LASTEXITCODE"
          }

          Write-Host "Combining: dksrc\dk0.cmd --errors-plain ${{ env.INPUTOPTIONS }} --verbose combine --origin-name '${{ steps.dk-vars.outputs.dk_id_library }}' --mirror '${{github.server_url}}/${{github.repository}}/releases/download/${{github.ref_name}}'"
          ${{ env.DK0WIN32 }} --errors-plain ${{ env.INPUTOPTIONS }} --verbose combine --origin-name '${{ steps.dk-vars.outputs.dk_id_library }}' --mirror '${{github.server_url}}/${{github.repository}}/releases/download/${{github.ref_name}}'
          if ($LASTEXITCODE -ne 0) {
            throw "dk0 combine failed with exit code $LASTEXITCODE"
          }

          Get-ChildItem -Directory dk-dist | ForEach-Object {
              $size = (Get-ChildItem $_.FullName -Recurse -File | Measure-Object -Property Length -Sum).Sum
              $sizeGB = [math]::Round($size / 1GB, 2)
              Write-Output "$($sizeGB) GB`t$($_.Name)"
          }

      - name: Query traces on Windows
        env:
            DK_BUILD_PUBKEY: "${{ env.INPUTPUBKEY }}"
            DK_BUILD_SECKEY: "${{ env.INPUTSECKEY }}"
            OCAMLRUNPARAM: b
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          ${{ env.DK0WIN32 }} --errors-plain ${{ env.INPUTOPTIONS }} --keys-env DK_BUILD query
          if ($LASTEXITCODE -ne 0) {
            throw "dk0 query failed with exit code $LASTEXITCODE"
          }

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: logs
          # ex. t/p/476/zx3y/l/Release.Agnostic/stdout.log
          path: t/p/*/*/l/*/

      # --------- X.1 Cache Save ----------
      - name: Cache save dk stores
        if: env.INPUTUSECACHE != '' && env.INPUTUSECACHE != 'false' && steps.restore-cache-dk-distribute.outputs.cache-hit == ''
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        id: save-cache-dk-distribute
        with:
            # The data stores (and build keys) are safe to share between Windows, macOS and Linux
            enableCrossOsArchive: true
            #   SYNC: must match Cache Load above
            path: t
            #   SYNC: must match Cache Load above
            key: dk-stores-and-keys-x1-${{ steps.dk-vars.outputs.dk_build_version_majmin }}-${{ github.run_id }} # update cache on every run
